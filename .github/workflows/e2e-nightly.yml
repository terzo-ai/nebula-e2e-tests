name: E2E Nightly (Dev - mafia.terzocloud.com)

on:
  schedule:
    - cron: "0 3 * * *" # 3 AM UTC daily
  workflow_dispatch:

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run all E2E tests
        run: uv run pytest tests/ -v --timeout=900 --alluredir=allure-results
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_TENANT_ID: ${{ vars.E2E_TENANT_ID }}
          E2E_ACCESS_TOKEN: ${{ secrets.E2E_ACCESS_TOKEN }}
          E2E_DRIVE_PASSWORD: ${{ secrets.E2E_DRIVE_PASSWORD }}
          E2E_EVENT_HUB_CONNECTION_STRING: ${{ secrets.E2E_EVENT_HUB_CONNECTION_STRING }}
          E2E_EVENT_HUB_NAME: ${{ vars.E2E_EVENT_HUB_NAME }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-nightly
          path: allure-results/

      - name: Upload pipeline report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-report-nightly
          path: reports/
