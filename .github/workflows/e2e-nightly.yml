name: E2E Nightly (Dev)

on:
  schedule:
    # Off-peak minute on purpose: GitHub's shared cron queue is heavily
    # oversubscribed at round hours (e.g. "0 3 * * *"), and scheduled runs
    # there get delayed by hours or silently dropped. 3:17 AM UTC is far
    # less contended and fires reliably.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      test_path:
        description: "pytest path(s) to run (space-separated)"
        type: string
        default: "tests/api/test_bulk_upload.py"

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    environment: dev
    env:
      TEST_PATH: ${{ inputs.test_path || 'tests/api/test_bulk_upload.py' }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run E2E tests
        run: uv run pytest $TEST_PATH -v --timeout=3600 --alluredir=allure-results
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_TENANT_ID: ${{ vars.E2E_TENANT_ID }}
          # Manual bearer override. If unset, the two-step auth flow runs instead.
          E2E_TOKEN: ${{ secrets.E2E_TOKEN }}
          # Two-step auth flow (used when E2E_TOKEN is empty):
          #   Step 1 — Analytics login
          E2E_ANALYTICS_EMAIL: ${{ vars.E2E_ANALYTICS_EMAIL }}
          E2E_ANALYTICS_PASSWORD: ${{ secrets.E2E_ANALYTICS_PASSWORD }}
          E2E_ANALYTICS_XSRF_TOKEN: ${{ secrets.E2E_ANALYTICS_XSRF_TOKEN }}
          E2E_ANALYTICS_COOKIE: ${{ secrets.E2E_ANALYTICS_COOKIE }}
          #   Step 2 — auth-service exchange (host set in config defaults)
          E2E_BULK_UPLOAD_SOURCE_URL: ${{ vars.E2E_BULK_UPLOAD_SOURCE_URL }}
          E2E_BULK_UPLOAD_FILE_NAME: ${{ vars.E2E_BULK_UPLOAD_FILE_NAME }}
          E2E_DRIVE_PASSWORD: ${{ secrets.E2E_DRIVE_PASSWORD }}
          E2E_EVENT_HUB_CONNECTION_STRING: ${{ secrets.E2E_EVENT_HUB_CONNECTION_STRING }}
          E2E_EVENT_HUB_NAME: ${{ vars.E2E_EVENT_HUB_NAME }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-nightly
          path: allure-results/

      - name: Upload pipeline report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-report-nightly
          path: reports/
