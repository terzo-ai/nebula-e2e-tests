name: E2E Nightly (Dev)

on:
  schedule:
    # Twice daily — 12:00 AM IST (18:30 UTC) and 8:00 PM IST (14:30 UTC).
    # Off-peak minutes to avoid GitHub's congested cron queue.
    - cron: "33 18 * * *"   # 12:03 AM IST
    - cron: "27 14 * * *"   # 7:57 PM IST
  workflow_dispatch:
    inputs:
      test_path:
        description: "pytest path(s) to run (space-separated)"
        type: string
        default: "tests/api/test_bulk_upload.py"

jobs:
  e2e-full:
    runs-on: ubuntu-latest
    environment: dev
    env:
      TEST_PATH: ${{ inputs.test_path || 'tests/api/test_bulk_upload.py' }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run E2E tests
        run: uv run pytest $TEST_PATH -v --timeout=3600 --alluredir=allure-results
        env:
          E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
          E2E_TENANT_ID: ${{ vars.E2E_TENANT_ID }}
          # Manual bearer override. If unset, the two-step auth flow runs instead.
          E2E_TOKEN: ${{ secrets.E2E_TOKEN }}
          # Two-step auth flow (used when E2E_TOKEN is empty):
          #   Step 1 — Analytics login
          E2E_ANALYTICS_EMAIL: ${{ vars.E2E_ANALYTICS_EMAIL }}
          E2E_ANALYTICS_PASSWORD: ${{ secrets.E2E_ANALYTICS_PASSWORD }}
          E2E_ANALYTICS_XSRF_TOKEN: ${{ secrets.E2E_ANALYTICS_XSRF_TOKEN }}
          E2E_ANALYTICS_COOKIE: ${{ secrets.E2E_ANALYTICS_COOKIE }}
          #   Step 2 — auth-service exchange (host set in config defaults)
          E2E_BULK_UPLOAD_SOURCE_URL: ${{ vars.E2E_BULK_UPLOAD_SOURCE_URL }}
          E2E_BULK_UPLOAD_FILE_NAME: ${{ vars.E2E_BULK_UPLOAD_FILE_NAME }}
          E2E_DRIVE_PASSWORD: ${{ secrets.E2E_DRIVE_PASSWORD }}
          E2E_EVENT_HUB_CONNECTION_STRING: ${{ secrets.E2E_EVENT_HUB_CONNECTION_STRING }}
          E2E_EVENT_HUB_NAME: ${{ vars.E2E_EVENT_HUB_NAME }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-nightly
          path: allure-results/

      - name: Upload pipeline report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-report-nightly
          path: reports/

      - name: Send Slack notification
        id: slack
        if: always() && vars.E2E_SLACK_NOTIFY != 'false' && hashFiles('reports/slack-payload.json') != ''
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.E2E_SLACK_BOT_TOKEN }}
          payload-file-path: reports/slack-payload.json
          errors: true

      - name: Resolve pipeline report path
        id: report
        if: always() && steps.slack.outputs.ts != ''
        run: |
          FILE=$(ls reports/pipeline-*.html 2>/dev/null | head -1 || true)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Attach pipeline report to Slack thread
        if: always() && steps.slack.outputs.ts != '' && steps.report.outputs.file != ''
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: files.uploadV2
          token: ${{ secrets.E2E_SLACK_BOT_TOKEN }}
          payload: |
            channel_id: "${{ steps.slack.outputs.channel }}"
            thread_ts: "${{ steps.slack.outputs.ts }}"
            file: "${{ steps.report.outputs.file }}"
            filename: "pipeline-report.html"
            initial_comment: "Full pipeline report"
          errors: true
