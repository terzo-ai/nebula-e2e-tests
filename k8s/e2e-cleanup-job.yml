apiVersion: batch/v1
kind: Job
metadata:
  name: nebula-e2e-cleanup
  namespace: terzo-squad
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      containers:
      - name: cleanup
        image: python:3.14-slim
        command:
        - /bin/sh
        - -c
        - |
          set -e
          pip install uv --quiet
          apt-get update -qq && apt-get install -y -qq git > /dev/null
          git clone https://github.com/terzo-ai/nebula-e2e-tests.git /app
          cd /app
          uv sync
          uv run python cleanup.py
        env:
        - name: E2E_BASE_URL
          value: "https://mafia.terzocloud.com"
        - name: E2E_TENANT_ID
          value: "1000012"
        - name: E2E_AUTH_SERVICE_URL
          value: "http://auth-service-dev1.product-internal.terzocloud.com"
        - name: E2E_AUTH_SERVICE_KEY
          value: "e9c4455dc79d417b986d0386eb7b3d25"
      restartPolicy: Never
