apiVersion: batch/v1
kind: Job
metadata:
  name: nebula-e2e-tests
  namespace: terzo-squad
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400  # auto-delete job after 24h
  template:
    metadata:
      labels:
        app: nebula-e2e-tests
    spec:
      containers:
      - name: e2e
        image: python:3.14-slim
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=== Setup ==="
          apt-get update -qq && apt-get install -y -qq git curl > /dev/null
          pip install uv --quiet

          echo "=== Auth service connectivity ==="
          for host in auth-service-dev1 auth-service-dev2 auth-service-dev3; do
            url="http://${host}.product-internal.terzocloud.com/auth/token"
            code=$(curl -s --connect-timeout 5 -o /tmp/auth-resp.txt -w "%{http_code}" \
              -X POST "$url" \
              -H "Content-Type: application/json" \
              -H "X-Access-Token: 9a264959-4f45-43a2-aaa2-ea30c9817af4" \
              -d '{"userId":1001359,"email":"shankar@terzocloud.com","tenantId":1000012,"grantType":"session_token"}' 2>/dev/null || echo "000")
            echo "$host → HTTP $code"
            if [ "$code" != "000" ]; then
              echo "Response: $(cat /tmp/auth-resp.txt | head -c 200)"
            fi
          done

          echo "=== Cloning repo ==="
          git clone https://github.com/terzo-ai/nebula-e2e-tests.git /app
          cd /app

          echo "=== Installing dependencies ==="
          uv sync

          echo "=== Run ID: $(date -u +%Y%m%d-%H%M%S) ==="
          echo "=== Running smoke tests ==="
          uv run pytest tests/api/test_smoke.py -v || true

          echo "=== Running pipeline tests ==="
          uv run pytest tests/api/ -v --timeout=900
        env:
        - name: E2E_BASE_URL
          value: "https://mafia.terzocloud.com"
        - name: E2E_TENANT_ID
          value: "1000012"
        - name: E2E_AUTH_SERVICE_URL
          value: "http://auth-service-dev1.product-internal.terzocloud.com"
        - name: E2E_AUTH_SERVICE_KEY
          value: "e9c4455dc79d417b986d0386eb7b3d25"
        # Fixtures from Azure File Share (optional — falls back to in-memory)
        # - name: E2E_FIXTURES_DIR
        #   value: "/mnt/e2e-fixtures"
        # volumeMounts:
        # - name: test-fixtures
        #   mountPath: /mnt/e2e-fixtures
        #   readOnly: true
      # volumes:
      # - name: test-fixtures
      #   azureFile:
      #     shareName: fs-terzo-ai-dev
      #     secretName: azure-storage-secret
      #     readOnly: true
      restartPolicy: Never
