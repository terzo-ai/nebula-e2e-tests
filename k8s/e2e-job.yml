apiVersion: batch/v1
kind: Job
metadata:
  name: nebula-e2e-tests
  namespace: terzo-squad
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: nebula-e2e-tests
      annotations:
        admission.datadoghq.com/enabled: "false"
    spec:
      # Init container fetches token using curl (Datadog doesn't interfere with init containers)
      initContainers:
      - name: fetch-token
        image: curlimages/curl
        command:
        - /bin/sh
        - -c
        - |
          TOKEN=$(curl -s --connect-timeout 10 \
            -X POST "http://auth-service-dev1.product-internal.terzocloud.com/auth/token" \
            -H "Content-Type: application/json" \
            -H "X-Access-Token: e9c4455dc79d417b986d0386eb7b3d25" \
            -d '{"userId":1001359,"email":"shankar@terzocloud.com","tenantId":1000012,"grantType":"session_token"}' \
            | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
          if [ -z "$TOKEN" ]; then
            echo "FAILED: could not fetch token"
            exit 1
          fi
          echo "$TOKEN" > /shared/access-token
          echo "Token fetched successfully (${#TOKEN} chars)"
        volumeMounts:
        - name: shared
          mountPath: /shared
      containers:
      - name: e2e
        image: python:3.14-slim
        command:
        - /bin/sh
        - -c
        - |
          set -e
          export E2E_ACCESS_TOKEN=$(cat /shared/access-token)
          echo "=== Token loaded (${#E2E_ACCESS_TOKEN} chars) ==="

          echo "=== Testing token against mafia ==="
          apt-get update -qq && apt-get install -y -qq git curl > /dev/null

          echo "--- access-token header ---"
          curl -s -w "\nHTTP %{http_code}\n" \
            -H "X-Tenant-Id: 1000012" \
            -H "access-token: $E2E_ACCESS_TOKEN" \
            "https://mafia.terzocloud.com/api/v1/documents?size=1" || true

          echo "=== Setup ==="
          apt-get update -qq && apt-get install -y -qq git > /dev/null
          pip install uv --quiet

          echo "=== Cloning repo ==="
          git clone https://github.com/terzo-ai/nebula-e2e-tests.git /app
          cd /app

          echo "=== Installing dependencies ==="
          uv sync

          echo "=== Run ID: $(date -u +%Y%m%d-%H%M%S) ==="
          echo "=== Running smoke tests ==="
          uv run pytest tests/api/test_smoke.py -v || true

          echo "=== Running pipeline tests ==="
          uv run pytest tests/api/ -v --timeout=900
        env:
        - name: E2E_BASE_URL
          value: "https://mafia.terzocloud.com"
        - name: E2E_TENANT_ID
          value: "1000012"
        volumeMounts:
        - name: shared
          mountPath: /shared
          readOnly: true
      volumes:
      - name: shared
        emptyDir: {}
      restartPolicy: Never
